<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 790" role="img" aria-labelledby="title desc">
  <title id="title">OpenAI wrapper：请求与返回的闭环位置</title>
  <desc id="desc">API implementation 组装请求并调用 SDK；Provider 原生流返回后被转换成 Pi EventStream。</desc>
  <defs>
    <marker id="arrow-call" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#52606d"/>
    </marker>
    <marker id="arrow-return" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#167565"/>
    </marker>
  </defs>
  <style>
    .heading { font: 700 23px Inter, 'Noto Sans SC', sans-serif; fill: #171a1f; }
    .detail { font: 14px Inter, 'Noto Sans SC', sans-serif; fill: #56616d; }
    .section { font: 700 11px 'SFMono-Regular', Consolas, monospace; fill: #6b7783; }
    .guide { stroke: #e2e7eb; stroke-width: 1; stroke-dasharray: 4 5; }
    .node { fill: #ffffff; stroke: #bdc7d0; stroke-width: 1.5; }
    .node.external { fill: #e8f1f8; stroke: #5f87aa; }
    .node.contract { fill: #f2f7f5; stroke: #6e978d; }
    .node.sidecar { fill: #f6f7f8; stroke: #aab4bd; }
    .node.active { fill: #dff1eb; stroke: #0f6b5b; stroke-width: 2.5; }
    .node.related { fill: #fff5d9; stroke: #a97312; stroke-width: 1.8; stroke-dasharray: 5 4; }
    .owner { font: 700 10px 'SFMono-Regular', Consolas, monospace; fill: #70808d; }
    .node-title { font: 700 14px Inter, 'Noto Sans SC', sans-serif; fill: #20262c; }
    .node-note { font: 12px Inter, 'Noto Sans SC', sans-serif; fill: #606c77; }
    .call { fill: none; stroke: #52606d; stroke-width: 1.8; marker-end: url(#arrow-call); }
    .return { fill: none; stroke: #167565; stroke-width: 1.8; stroke-dasharray: 6 4; marker-end: url(#arrow-return); }
    .ownership { fill: none; stroke: #8b98a4; stroke-width: 1.4; stroke-dasharray: 3 4; marker-end: url(#arrow-call); }
    .edge-label { font: 11px Inter, 'Noto Sans SC', sans-serif; fill: #5f6c77; paint-order: stroke; stroke: #ffffff; stroke-width: 4px; stroke-linejoin: round; }
    .return-label { fill: #167565; }
    .legend { font: 12px Inter, 'Noto Sans SC', sans-serif; fill: #56616d; }
  </style>
  <rect width="1200" height="790" fill="#ffffff"/>
  <text x="28" y="34" class="heading">OpenAI wrapper：请求与返回的闭环位置</text>
  <text x="28" y="58" class="detail">API implementation 组装请求并调用 SDK；Provider 原生流返回后被转换成 Pi EventStream。</text>

  <line x1="28" y1="560" x2="1172" y2="560" class="guide"/>
  <text x="28" y="584" class="section">PROCESS / NETWORK BOUNDARY</text>

  <!-- Agent and AgentHarness are sibling entrypoints. Neither wraps the other. -->
  <path d="M225 151 H265 V194 H305" class="call"/>
  <path d="M225 282 H265 V232 H305" class="call"/>
  <text x="236" y="143" class="edge-label">prompt / continue</text>
  <text x="238" y="273" class="edge-label">prompt</text>

  <!-- runAgentLoop depends on an injected port; Harness creates a Models-backed implementation. -->
  <path d="M520 213 H585" class="call"/>
  <text x="531" y="203" class="edge-label">call</text>
  <path d="M745 213 H805" class="call"/>
  <text x="753" y="203" class="edge-label">Harness</text>
  <path d="M965 213 H1025" class="call"/>
  <text x="974" y="203" class="edge-label">delegate</text>

  <!-- Provider dispatches by model.api; the API module owns protocol conversion and transport use. -->
  <path d="M1100 260 V355 H1060 V390" class="call"/>
  <text x="1076" y="349" class="edge-label">model.api</text>
  <path d="M895 518 V590 H855 V625" class="call"/>
  <text x="874" y="585" class="edge-label">SDK call</text>
  <path d="M950 668 H1010" class="call"/>
  <text x="967" y="657" class="edge-label">HTTP</text>

  <!-- Native provider events return to the API implementation. -->
  <path d="M1010 692 H950" class="return"/>
  <text x="956" y="715" class="edge-label return-label">response</text>
  <path d="M830 625 V548 H1035 V518" class="return"/>
  <text x="846" y="543" class="edge-label return-label">SDK async iterable / Response.body</text>

  <!-- The API module translates native events into the uniform Pi stream. -->
  <path d="M815 469 H755" class="return"/>
  <text x="763" y="458" class="edge-label return-label">Pi events</text>
  <path d="M660 420 V260" class="return"/>
  <text x="670" y="350" class="edge-label return-label">returns EventStream</text>
  <path d="M585 239 H520" class="return"/>
  <text x="526" y="254" class="edge-label return-label">consume</text>

  <!-- Tool execution is an internal loop concern, not an API-adapter layer. -->
  <path d="M365 260 V385 H350 V420" class="call"/>
  <text x="296" y="380" class="edge-label">ToolCall</text>
  <path d="M470 420 V385 H475 V260" class="return"/>
  <text x="431" y="402" class="edge-label return-label">ToolResult</text>

  <!-- Session is Harness-owned state beside the call path. -->
  <path d="M105 345 V420" class="ownership"/>
  <text x="115" y="382" class="edge-label">build / append</text>
  <path d="M175 420 V345" class="return"/>
  <text x="185" y="402" class="edge-label return-label">context</text>

  <g>
    <title>Agent</title>
    <rect x="35" y="112" width="190" height="94" rx="6" class="node "/>
    <text x="47" y="129" class="owner">pi-agent</text>
    <text x="47" y="150" class="node-title">Agent</text>
    <text x="47" y="166" class="node-note">state + subscribers</text>
<text x="47" y="182" class="node-note">accepts injected</text>
<text x="47" y="198" class="node-note">StreamFn</text>
  </g>
<g>
    <title>AgentHarness</title>
    <rect x="35" y="235" width="190" height="110" rx="6" class="node "/>
    <text x="47" y="252" class="owner">pi-agent</text>
    <text x="47" y="273" class="node-title">AgentHarness</text>
    <text x="47" y="289" class="node-note">owns Models / Tools</text>
<text x="47" y="305" class="node-note">resources / request hooks</text>
<text x="47" y="321" class="node-note">builds turn state + StreamFn</text>
  </g>
<g>
    <title>runAgentLoop()</title>
    <rect x="305" y="166" width="215" height="94" rx="6" class="node related"/>
    <text x="317" y="183" class="owner">pi-agent</text>
    <text x="317" y="204" class="node-title">runAgentLoop()</text>
    <text x="317" y="220" class="node-note">orchestrates turns</text>
<text x="317" y="236" class="node-note">consumes uniform events</text>
  </g>
<g>
    <title>StreamFn</title>
    <rect x="585" y="166" width="160" height="94" rx="6" class="node contract"/>
    <text x="597" y="183" class="owner">pi-agent contract</text>
    <text x="597" y="204" class="node-title">StreamFn</text>
    <text x="597" y="220" class="node-note">model I/O port</text>
<text x="597" y="236" class="node-note">returns EventStream</text>
  </g>
<g>
    <title>Models</title>
    <rect x="805" y="166" width="160" height="94" rx="6" class="node "/>
    <text x="817" y="183" class="owner">pi-ai</text>
    <text x="817" y="204" class="node-title">Models</text>
    <text x="817" y="220" class="node-note">find Provider</text>
<text x="817" y="236" class="node-note">resolve request auth</text>
  </g>
<g>
    <title>Provider</title>
    <rect x="1025" y="166" width="150" height="94" rx="6" class="node related"/>
    <text x="1037" y="183" class="owner">pi-ai</text>
    <text x="1037" y="204" class="node-title">Provider</text>
    <text x="1037" y="220" class="node-note">model catalog</text>
<text x="1037" y="236" class="node-note">dispatch model.api</text>
  </g>
<g>
    <title>Session</title>
    <rect x="35" y="420" width="190" height="82" rx="6" class="node sidecar"/>
    <text x="47" y="437" class="owner">pi-agent</text>
    <text x="47" y="458" class="node-title">Session</text>
    <text x="47" y="474" class="node-note">build context</text>
<text x="47" y="490" class="node-note">persist message_end</text>
  </g>
<g>
    <title>Tool protocol + executor</title>
    <rect x="285" y="420" width="235" height="98" rx="6" class="node "/>
    <text x="297" y="437" class="owner">pi-agent</text>
    <text x="297" y="458" class="node-title">Tool protocol + executor</text>
    <text x="297" y="474" class="node-note">ToolCall -&gt; validate -&gt; execute</text>
<text x="297" y="490" class="node-note">ToolResult -&gt; next model turn</text>
  </g>
<g>
    <title>AssistantMessageEventStream</title>
    <rect x="565" y="420" width="190" height="114" rx="6" class="node active"/>
    <text x="577" y="437" class="owner">pi-ai contract</text>
    <text x="577" y="458" class="node-title">AssistantMessage</text>
<text x="577" y="475" class="node-title">EventStream</text>
    <text x="577" y="492" class="node-note">start / delta / done / error</text>
<text x="577" y="508" class="node-note">uniform provider-neutral</text>
<text x="577" y="524" class="node-note">output</text>
  </g>
<g>
    <title>API implementation</title>
    <rect x="815" y="390" width="310" height="128" rx="6" class="node active"/>
    <text x="827" y="407" class="owner">pi-ai · src/api/*</text>
    <text x="827" y="428" class="node-title">API implementation</text>
    <text x="827" y="444" class="node-note">convert Context -&gt; provider request</text>
<text x="827" y="460" class="node-note">call SDK / fetch</text>
<text x="827" y="476" class="node-note">map provider events -&gt; Pi events</text>
  </g>
<g>
    <title>Provider SDK / fetch</title>
    <rect x="760" y="625" width="190" height="102" rx="6" class="node active"/>
    <text x="772" y="642" class="owner">process dependency</text>
    <text x="772" y="663" class="node-title">Provider SDK / fetch</text>
    <text x="772" y="679" class="node-note">HTTP transport</text>
<text x="772" y="695" class="node-note">native stream /</text>
<text x="772" y="711" class="node-note">Response.body</text>
  </g>
<g>
    <title>Provider HTTP API</title>
    <rect x="1010" y="625" width="165" height="86" rx="6" class="node related"/>
    <text x="1022" y="642" class="owner">external service</text>
    <text x="1022" y="663" class="node-title">Provider HTTP API</text>
    <text x="1022" y="679" class="node-note">OpenAI / Anthropic</text>
<text x="1022" y="695" class="node-note">network boundary</text>
  </g>

  <line x1="28" y1="765" x2="82" y2="765" class="call"/>
  <text x="91" y="769" class="legend">调用 / 请求</text>
  <line x1="190" y1="765" x2="244" y2="765" class="return"/>
  <text x="253" y="769" class="legend">事件 / 返回</text>
  <rect x="357" y="757" width="12" height="12" rx="2" fill="#dff1eb" stroke="#0f6b5b"/>
  <text x="376" y="769" class="legend">本篇位置</text>
  <rect x="468" y="757" width="12" height="12" rx="2" fill="#fff5d9" stroke="#a97312" stroke-dasharray="3 2"/>
  <text x="487" y="769" class="legend">相关边界</text>
  <rect x="588" y="757" width="12" height="12" rx="2" fill="#e8f1f8" stroke="#5f87aa"/>
  <text x="607" y="769" class="legend">外部服务</text>
</svg>